server:
  port: 8080

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: order-api

spring:
  application:
    name: order-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/marketstream}
    username: ${SPRING_DATASOURCE_USERNAME:marketstream}
    password: ${SPRING_DATASOURCE_PASSWORD:marketstream_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Idempotent producer - exactly-once semantics
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        transactional.id: order-api-tx-${random.uuid}
    consumer:
      group-id: order-api-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.marketstream.*"

app:
  kafka:
    topics:
      order-events: order_events
      inventory-events: inventory_events
      payment-events: payment_events
      order-dlq: order_events_dlq
  idempotency:
    ttl-hours: 24
  retry:
    max-attempts: 3
    initial-backoff-ms: 1000
    multiplier: 2.0
